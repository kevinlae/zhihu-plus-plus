name: Android Build (Self-Contained SDK)

on:
  workflow_dispatch:  # 手动点击按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- 关键：手动安装 Android SDK 命令行工具 -----
      - name: 安装 Android SDK 工具
        run: |
          # 创建 SDK 目录并下载命令行工具（自动获取最新版）
          mkdir -p ${ANDROID_SDK_ROOT}/cmdline-tools
          cd ${ANDROID_SDK_ROOT}/cmdline-tools
          
          # 下载 commandline-tools（Linux 版）
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm commandlinetools-linux-*.zip
          
          # 重命名为 "latest" 是 sdkmanager 的硬性要求
          mv cmdline-tools latest
          
          # 接受许可协议
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null
          
          # 安装编译需要的 SDK 组件（Android 14 平台和 34.0.0 构建工具是安全选择）
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools"

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      # 只编译 Debug 版本（成功率最高，不需要签名）
      - name: 编译 Debug APK
        run: ./gradlew assembleDebug

      # （可选）如果你需要 Release 版，取消下面三行的注释
      # - name: 编译 Release APK
      #   run: ./gradlew assembleRelease

      - name: 上传 APK 文件
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-plus-plus-apk
          path: app/build/outputs/apk/**/*.apk
