name: Build Lite Release APK (Auto-Signed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- 准备 Android 环境（预装 SDK + 安装 NDK）-----
      - name: 准备 Android 环境并安装 NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} --licenses > /dev/null
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} "ndk;27.0.12077973"

      # ----- 安装 Rust 及目标平台 -----
      - name: 安装 Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      # ----- 安装 cargo-ndk -----
      - name: 安装 cargo-ndk
        run: |
          source $HOME/.cargo/env
          cargo install cargo-ndk

      # ----- 编译 -----
      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 编译 Lite Release APK
        run: ./gradlew assembleLiteRelease

      # ----- 签名 Release APK（使用 Debug 证书）-----
      - name: 用 Debug 证书签名
        run: |
          # 如果没有 debug.keystore，则生成一个（CI 默认应该有，但以防万一）
          if [ ! -f $HOME/.android/debug.keystore ]; then
            keytool -genkey -v \
              -keystore $HOME/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # 找到编译出的 APK（可能是 app-lite-release.apk 或带 unsigned）
          APK_FILE=$(find app/build/outputs/apk/lite/release -name "*.apk" | head -n 1)

          # 签名
          ${ANDROID_HOME}/build-tools/34.0.0/apksigner sign \
            --ks $HOME/.android/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --ks-key-alias androiddebugkey \
            $APK_FILE

      # ----- 上传已签名的 APK -----
      - name: 上传 Lite 版 APK
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-plus-plus-lite-release
          path: app/build/outputs/apk/lite/release/*.apk
