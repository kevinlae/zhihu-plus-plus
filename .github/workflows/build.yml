name: Build Lite Release APK (Optimized)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- 准备 Android 环境（预装 SDK + 安装 NDK）-----
      - name: 准备 Android 环境并安装 NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} --licenses > /dev/null
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --sdk_root=${ANDROID_HOME} "ndk;27.0.12077973"

      # ----- 安装 Rust 及目标平台 -----
      - name: 安装 Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      # ----- 安装 cargo-ndk -----
      - name: 安装 cargo-ndk
        run: |
          source $HOME/.cargo/env
          cargo install cargo-ndk

      # ----- 编译 -----
      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      # 🔥 核心修改：编译 Lite 版本的 Release APK
      - name: 编译 Lite Release APK（不含 AI）
        run: ./gradlew assembleLiteRelease

      - name: 上传 Lite 版 APK
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-plus-plus-lite-release  # 修改后的包名，更清晰
          path: app/build/outputs/apk/lite/release/*.apk  # 注意路径也变了
